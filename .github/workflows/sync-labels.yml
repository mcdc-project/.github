# =============================================================================
# Synchronize Organization Labels
# =============================================================================
#
# Synchronizes the organization-wide label taxonomy across selected MC/DC
# repositories.
#
# The label configuration in `.github/labels.yml` is the single source of truth.
# Labels not listed in the configuration are automatically removed to maintain
# a consistent, organization-managed taxonomy.
#
# Triggered automatically whenever the label configuration changes on `main`.
# Can also be run manually from the Actions tab.
# =============================================================================

name: Sync organization labels

on:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
      - ".github/workflows/sync-labels.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-labels:
    name: Synchronize labels
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Synchronize organization labels
        uses: srealmoreno/label-sync-action@v2
        with:
          token: ${{ secrets.LABEL_SYNC_TOKEN }}

          repositories: |
            mcdc-project/mcdc
            mcdc-project/mcdc-vvp

          config-file: .github/labels.yml

          # Treat labels.yml as the authoritative organization label taxonomy.
          # Labels not listed in the configuration are automatically removed.
          clean-labels: true
