# =============================================================================
# MC/DC Organization Labels
# =============================================================================
#
# Organization-wide labels synchronized across MC/DC repositories.
#
# Labels are intentionally limited to:
#   - contributor guidance;
#   - automation;
#   - special release information; and
#   - technical domains not covered by GitHub Issue fields.
#
# Issue Type, Priority, Status, Milestone, and Assignee are managed through
# GitHub Issues and Projects rather than labels.
# =============================================================================

# =============================================================================
# Contribution
# =============================================================================

- name: "good first issue"
  color: "7057ff"
  description: "Suitable for a first contribution."

- name: "help wanted"
  color: "008672"
  description: "Maintainers welcome community contributions."

# =============================================================================
# Automation
# =============================================================================

- name: "stale"
  color: "ededed"
  description: "Issue has had no recent activity."

# =============================================================================
# Special
# =============================================================================

- name: "breaking change"
  color: "b60205"
  description: "Introduces an incompatible change."

